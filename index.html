<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    <title>Britlex Landing Page</title>
</head>
<body class="bg-white text-gray-900">

    <nav class="container mx-auto px-6 py-8 flex items-center justify-between">
        <div class="text-2xl font-bold tracking-tight">
            Brit<span class="text-gray-400 font-light">lex</span>
        </div>
        
        <div class="hidden md:flex space-x-8 font-medium text-gray-700">
            <a href="#" class="hover:text-black">Home</a>
            <a href="#" class="hover:text-black">Skills</a>
            <a href="#" class="hover:text-black">About Us</a>
            <a href="#" class="hover:text-black">Pricing</a>
            <a href="#" class="hover:text-black">Contacts</a>
        </div>

        <a href="#" class="border-2 border-gray-800 px-8 py-2 rounded-lg font-semibold hover:bg-gray-800 hover:text-white transition">
            Let's Talk
        </a>
    </nav>

    <main class="container mx-auto px-6 mt-12 md:mt-20 flex flex-col md:flex-row items-center">
        
        <div class="md:w-1/2 relative">
            <h1 class="text-5xl md:text-7xl font-bold leading-tight mb-8">
                Learn <br> Any Foreign <br> Language
                <span class="inline-block ml-2 align-middle">
                    <svg class="w-12 h-12 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.674M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                </span>
            </h1>
            
            <p class="text-gray-500 text-lg md:text-xl max-w-md mb-10 leading-relaxed">
                With our teachers who write a program for each student, you will be able to make your first sketch after the first lesson.
            </p>

            <button class="bg-[#2D3639] text-white px-12 py-5 rounded-2xl text-xl font-semibold hover:bg-black transition shadow-lg">
                Get started
            </button>
        </div>

        <div class="md:w-1/2 mt-16 md:mt-0 relative flex justify-center">
            <div class="relative w-full max-w-lg">
                <img src="/img/Learning languages-bro 1.png" alt="Language Learning Illustration" class="w-full">
                
                <div class="absolute -top-4 left-10 bg-white border shadow-sm p-2 rounded-lg flex items-center gap-2">
                    <span class="w-4 h-3 bg-red-500"></span> <span class="text-xs font-bold">Hola</span>
                </div>
                <div class="absolute top-1/2 -right-4 bg-white border shadow-sm p-2 rounded-lg flex items-center gap-2">
                    <span class="w-4 h-3 bg-blue-500"></span> <span class="text-xs font-bold">Hello</span>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
